name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on a new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Tokens must be built first — preview.ts imports the generated CSS.
      - name: Build design tokens
        run: npm run build:tokens

      - name: Build Storybook
        run: npm run build:storybook

      # Smoke-tests every story (renders without crashing) via @storybook/test-runner.
      # Non-blocking: a failure here surfaces in the run log but doesn't stop the
      # Pages deploy — flip continue-on-error to false once this is trusted enough
      # to gate the deploy.
      - name: Test Storybook (smoke)
        continue-on-error: true
        run: |
          npx playwright install --with-deps chromium
          npm run test:storybook:ci

      # Generate LLM-readable Markdown docs and publish them at the site root so
      # crawlers/agents can read content the JS-rendered Storybook pages don't expose.
      - name: Build LLM docs
        run: |
          npm run build:llms
          cp -R docs/components docs/foundations docs/llms.txt docs/llms-full.txt \
            packages/harbor-storybook/storybook-static/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/harbor-storybook/storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
