name: Lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  audit-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit component CSS for hardcoded values
        run: npm run audit:tokens
